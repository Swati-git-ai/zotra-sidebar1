<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zotra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
  font-size: 13px;
  background: #f1f3f4;
  color: #202124;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Design tokens ── */
:root {
  --z-bg:         #F8F7F4;
  --z-surface:    #FFFFFF;
  --z-border:     #E8E6E0;
  --z-border-s:   #D3D1C7;
  --z-text:       #1A1A18;
  --z-text-2:     #5F5E5A;
  --z-text-3:     #888780;
  --z-accent:     #534AB7;
  --z-accent-h:   #3C3489;
  --z-accent-bg:  #EEEDFE;
  --z-accent-tx:  #3C3489;
  --z-teal:       #1D9E75;
  --z-teal-bg:    #E1F5EE;
  --z-teal-tx:    #085041;
  --z-amber:      #BA7517;
  --z-amber-bg:   #FAEEDA;
  --z-amber-tx:   #633806;
  --z-red:        #E24B4A;
  --z-red-bg:     #FCEBEB;
  --z-red-tx:     #A32D2D;
  --z-green:      #639922;
  --z-green-bg:   #EAF3DE;
  --z-green-tx:   #27500A;
  --z-r-xs:       3px;
  --z-r-sm:       4px;
  --z-r-md:       6px;
  --z-r-lg:       8px;
  --z-r-xl:       10px;
  --z-r-full:     9999px;
  --z-t:          0.12s ease;
}

/* ════════════════════════════════════════════════════════════
   GMAIL CHROME MOCKUP (shows the add-in in context)
════════════════════════════════════════════════════════════ */
.gmail-chrome {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
/* top bar */
.gmail-topbar {
  height: 64px;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.gmail-logo { display: flex; align-items: center; gap: 6px; }
.gmail-logo-m {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #EA4335 0%, #FBBC05 35%, #34A853 65%, #4285F4 100%);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.gmail-logo-txt { font-size: 22px; color: #5f6368; font-weight: 300; letter-spacing: -0.5px; }
.gmail-srch {
  flex: 1; max-width: 720px; height: 46px;
  background: #eaf1fb; border-radius: 24px;
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
}
.gmail-srch input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 16px; color: #202124;
}
.gmail-srch input::placeholder { color: #5f6368; }
/* content area */
.gmail-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* left nav */
.gmail-nav {
  width: 72px;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  flex-shrink: 0;
  border-right: 1px solid #e0e0e0;
}
.gmail-nav-btn {
  width: 56px; height: 48px; border-radius: 24px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; gap: 2px;
}
.gmail-nav-btn:hover { background: #f1f3f4; }
.gmail-nav-btn.active { background: #fce8e6; }
.gmail-nav-btn svg { width: 20px; height: 20px; stroke: #5f6368; fill: none; stroke-width: 1.5; stroke-linecap: round; }
.gmail-nav-btn.active svg { stroke: #d93025; }
.gmail-nav-lbl { font-size: 9px; color: #5f6368; }
.gmail-nav-btn.active .gmail-nav-lbl { color: #d93025; }
/* email list pane */
.gmail-list {
  width: 280px;
  background: #fff;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.gmail-list-hdr {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f1f3f4;
}
.gmail-list-title { font-size: 16px; font-weight: 400; color: #202124; }
.gmail-list-items { flex: 1; overflow-y: auto; }
.gmail-email-row {
  padding: 8px 16px;
  border-bottom: 1px solid #f1f3f4;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.1s;
}
.gmail-email-row:hover { background: #f1f3f4; }
.gmail-email-row.active { background: #fce8e6; }
.gmail-email-row.unread .gmail-er-sender { font-weight: 600; }
.gmail-er-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.gmail-er-body { flex: 1; min-width: 0; }
.gmail-er-r1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.gmail-er-sender { font-size: 13px; color: #202124; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.gmail-er-time { font-size: 11px; color: #5f6368; flex-shrink: 0; }
.gmail-er-subj { font-size: 12px; color: #202124; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
.gmail-er-snip { font-size: 11px; color: #5f6368; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* email view pane */
.gmail-view {
  flex: 1;
  background: #fff;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.gmail-view-hdr {
  padding: 12px 20px 8px;
  border-bottom: 1px solid #e0e0e0;
  flex-shrink: 0;
}
.gmail-view-subject { font-size: 22px; font-weight: 400; color: #202124; margin-bottom: 4px; }
.gmail-view-meta { font-size: 12px; color: #5f6368; display: flex; align-items: center; gap: 8px; }
.gmail-view-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.gmail-email-card {
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}
.gmail-ec-hdr {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
}
.gmail-ec-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.gmail-ec-name { font-size: 13px; font-weight: 500; }
.gmail-ec-time { font-size: 11px; color: #5f6368; margin-left: auto; }
.gmail-ec-body {
  padding: 10px 14px;
  font-size: 13px;
  color: #3c4043;
  line-height: 1.7;
  border-top: 1px solid #f1f3f4;
}
/* add-in sidebar slot */
.gmail-addin-slot {
  width: 380px;
  flex-shrink: 0;
  border-left: 1px solid #e0e0e0;
  background: #f8f9fa;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ════════════════════════════════════════════════════════════
   ZOTRA ADD-IN SIDEBAR
════════════════════════════════════════════════════════════ */
.z-sidebar {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--z-surface);
  overflow: hidden;
  font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
}

/* ── Shell: header ── */
.z-shell-hdr {
  padding: 10px 13px 9px;
  background: var(--z-surface);
  border-bottom: 0.5px solid var(--z-border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.z-wordmark {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.z-wordmark-logo {
  width: 22px; height: 22px;
  background: var(--z-accent);
  border-radius: var(--z-r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.z-wordmark-logo svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }
.z-wordmark-name { font-size: 13px; font-weight: 600; color: var(--z-text); letter-spacing: -0.2px; }
.z-account-name { font-size: 10px; color: var(--z-text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.z-conn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--z-teal);
  flex-shrink: 0;
  cursor: help;
  position: relative;
}
.z-conn-dot::after {
  content: attr(data-tip);
  position: absolute; right: 0; top: 100%; margin-top: 5px;
  background: var(--z-text); color: #fff; font-size: 9px;
  padding: 3px 7px; border-radius: 3px; white-space: nowrap;
  display: none; z-index: 20;
}
.z-conn-dot:hover::after { display: block; }
.z-open-btn {
  font-size: 10px; color: var(--z-accent-tx);
  background: none; border: none; cursor: pointer;
  padding: 2px 5px; border-radius: var(--z-r-sm);
  white-space: nowrap; font-family: inherit;
  display: flex; align-items: center; gap: 3px;
  transition: background var(--z-t);
}
.z-open-btn:hover { background: var(--z-accent-bg); }
.z-open-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── Shell: tabs ── */
.z-tabs {
  display: flex;
  background: var(--z-surface);
  border-bottom: 0.5px solid var(--z-border);
  flex-shrink: 0;
}
.z-tab {
  flex: 1;
  padding: 8px 4px;
  font-size: 11px;
  color: var(--z-text-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  background: none;
  border-top: none; border-left: none; border-right: none;
  text-align: center;
  user-select: none;
  font-family: inherit;
  transition: color var(--z-t);
  white-space: nowrap;
}
.z-tab:hover { color: var(--z-text-2); }
.z-tab.on { color: var(--z-accent-tx); border-bottom-color: var(--z-accent); font-weight: 500; }
.z-tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--z-accent); color: #fff;
  font-size: 8px; font-weight: 600; margin-left: 3px;
  vertical-align: middle;
}

/* ── Scrollable content zone ── */
.z-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.z-zone { display: none; }
.z-zone.on { display: block; }

/* ── Provisional notice ── */
.z-prov-notice {
  padding: 6px 13px;
  background: var(--z-amber-bg);
  border-bottom: 0.5px solid var(--z-border);
  font-size: 9px;
  color: var(--z-amber-tx);
  line-height: 1.5;
  display: flex;
  align-items: center;
  gap: 6px;
}
.z-prov-notice svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }

/* ── Section ── */
.z-sec {
  padding: 9px 13px;
  border-bottom: 0.5px solid var(--z-border);
}
.z-sec:last-child { border-bottom: none; }
.z-sec-lbl {
  font-size: 9px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--z-text-3);
  margin-bottom: 7px;
  display: flex; align-items: center; gap: 5px;
}
.z-sec-lbl span { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 9px; }

/* ── Classification badge ── */
.z-cls {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: var(--z-r-full);
  font-size: 11px; font-weight: 500;
  margin-bottom: 0;
}
.z-cls-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.z-cls-commercial { background: var(--z-accent-bg); color: var(--z-accent-tx); }
.z-cls-preq       { background: var(--z-amber-bg);  color: var(--z-amber-tx);  }
.z-cls-not        { background: var(--z-bg); color: var(--z-text-3); border: 0.5px solid var(--z-border); }

/* ── Five Forces mini ── */
.z-ff-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.z-ff-cell {
  background: var(--z-bg);
  border-radius: var(--z-r-md);
  padding: 7px 9px;
}
.z-ff-nm { font-size: 9px; color: var(--z-text-3); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.z-ff-nm .band { font-size: 8px; font-weight: 500; padding: 0 4px; border-radius: 2px; }
.band-strong { background: var(--z-teal-bg);  color: var(--z-teal-tx);  }
.band-caution{ background: var(--z-amber-bg); color: var(--z-amber-tx); }
.band-weak   { background: var(--z-red-bg);   color: var(--z-red-tx);   }
.band-null   { background: var(--z-bg); color: var(--z-text-3); border: 0.5px solid var(--z-border); cursor: help; text-decoration: underline dotted; }
.z-ff-bar-w { height: 3px; background: var(--z-border); border-radius: 2px; overflow: hidden; margin-bottom: 3px; }
.z-ff-bar-f { height: 100%; border-radius: 2px; transition: width .4s; }
.z-ff-score { font-size: 15px; font-weight: 500; line-height: 1; }

/* ── Pre-qual block ── */
.z-preq-block {
  background: var(--z-amber-bg);
  border: 0.5px solid var(--z-amber);
  border-radius: var(--z-r-md);
  padding: 9px 11px;
  margin-top: 8px;
}
.z-preq-title { font-size: 11px; font-weight: 500; color: var(--z-amber-tx); margin-bottom: 5px; }
.z-preq-item { font-size: 10px; color: var(--z-amber-tx); padding: 2px 0; display: flex; align-items: center; gap: 5px; }
.z-preq-item::before { content: '◦'; flex-shrink: 0; }

/* ── Hard fact row ── */
.z-hf-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 0; border-bottom: 0.5px solid var(--z-border);
  font-size: 11px;
}
.z-hf-row:last-child { border-bottom: none; }
.z-hf-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.z-hf-key { color: var(--z-text-3); min-width: 72px; flex-shrink: 0; }
.z-hf-val { color: var(--z-text); font-weight: 500; flex: 1; line-height: 1.4; word-break: break-word; }
.z-hf-conf { flex-shrink: 0; }
/* confidence pips */
.z-cf { display: flex; gap: 2px; }
.z-cf-p { width: 6px; height: 6px; border-radius: 1px; background: var(--z-border); }
.z-cf-p.hi { background: var(--z-teal); }
.z-cf-p.md { background: var(--z-amber); }
.z-cf-p.lo { background: var(--z-red); }

/* ── Soft signal row ── */
.z-ss-row {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 4px 0; border-bottom: 0.5px solid var(--z-border);
  font-size: 11px;
}
.z-ss-row:last-child { border-bottom: none; }
.z-ss-key { color: var(--z-text-2); flex: 1; line-height: 1.4; }
.z-ss-hint { font-size: 9px; color: var(--z-text-3); margin-top: 1px; }

/* ── Ambiguity + gap rows ── */
.z-amb-row {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 4px 0; border-bottom: 0.5px solid var(--z-border);
  font-size: 11px; color: var(--z-amber-tx); line-height: 1.4;
}
.z-amb-row:last-child { border-bottom: none; }
.z-amb-row::before { content: '⚑'; flex-shrink: 0; font-size: 10px; margin-top: 1px; }
.z-gap-row {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 4px 0; border-bottom: 0.5px solid var(--z-border);
  font-size: 11px; color: var(--z-text-3); line-height: 1.4;
}
.z-gap-row:last-child { border-bottom: none; }
.z-gap-row::before { content: '?'; flex-shrink: 0; }

/* ── Brief: baseline row ── */
.z-bl-row {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 5px 0; border-bottom: 0.5px solid var(--z-border); font-size: 11px;
}
.z-bl-row:last-child { border-bottom: none; }
.z-bl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.z-bl-key { color: var(--z-text-3); min-width: 64px; flex-shrink: 0; }
.z-bl-val { color: var(--z-amber); flex: 1; line-height: 1.4; }
.z-bl-val.conf { color: var(--z-teal-tx); }
/* stakeholder mini */
.z-sh-row {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 0; border-bottom: 0.5px solid var(--z-border);
}
.z-sh-row:last-child { border-bottom: none; }
.z-sh-av {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--z-accent-bg); color: var(--z-accent-tx);
  font-size: 7px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.z-sh-nm { font-size: 11px; font-weight: 500; color: var(--z-text); }
.z-sh-role { font-size: 9px; color: var(--z-text-3); }
.z-sh-auth { font-size: 8px; margin-left: auto; flex-shrink: 0; }
/* open question */
.z-oq-row {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 4px 0; border-bottom: 0.5px solid var(--z-border); font-size: 11px;
}
.z-oq-row:last-child { border-bottom: none; }
.z-oq-box { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--z-border); flex-shrink: 0; margin-top: 1px; }
.z-oq-q { flex: 1; color: var(--z-text-2); line-height: 1.4; }
.z-oq-pri { font-size: 9px; flex-shrink: 0; }
/* add signal link */
.z-add-sig {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 0; font-size: 11px; color: var(--z-text-3);
  cursor: pointer; border-top: 0.5px solid var(--z-border); margin-top: 4px;
  background: none; border-left: none; border-right: none; border-bottom: none;
  font-family: inherit; width: 100; text-align: left;
}
.z-add-sig:hover { color: var(--z-accent-tx); }
.z-add-sig svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── No workspace fallback ── */
.z-fallback {
  background: var(--z-bg);
  border: 1.5px dashed var(--z-border-s);
  border-radius: var(--z-r-lg);
  padding: 16px 14px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.z-fallback-ico {
  width: 36px; height: 36px; border-radius: var(--z-r-lg);
  border: 0.5px solid var(--z-border);
  display: flex; align-items: center; justify-content: center;
}
.z-fallback-ico svg { width: 18px; height: 18px; stroke: var(--z-text-3); fill: none; stroke-width: 1.5; stroke-linecap: round; }
.z-fallback-t { font-size: 12px; font-weight: 500; color: var(--z-text-2); }
.z-fallback-d { font-size: 11px; color: var(--z-text-3); line-height: 1.5; }
.z-fallback-btns { display: flex; gap: 6px; width: 100%; }

/* ── Draft zone ── */
.z-draft-txt {
  background: var(--z-bg);
  border: 0.5px solid var(--z-border);
  border-radius: var(--z-r-md);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--z-text-2);
  line-height: 1.7;
  white-space: pre-wrap;
  cursor: text;
  user-select: text;
  word-break: break-word;
}
.z-draft-copy-btn {
  width: 100%; padding: 8px;
  background: var(--z-accent-bg); color: var(--z-accent-tx);
  border: 0.5px solid var(--z-accent-bg);
  border-radius: var(--z-r-md);
  font-size: 11px; font-weight: 500; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background var(--z-t), color var(--z-t);
}
.z-draft-copy-btn:hover { background: var(--z-accent); color: #fff; }
.z-draft-copy-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }
.z-send-note {
  font-size: 9px; color: var(--z-text-3); text-align: center;
  line-height: 1.5; padding: 0 4px;
}
/* auto-send section */
.z-as-sec {
  background: var(--z-bg);
  border-radius: var(--z-r-md);
  padding: 9px 11px;
}

/* ── UTILS ── */
function ffc(v) { return v >= 75 ? 'var(--z-teal)' : v >= 50 ? 'var(--z-amber)' : 'var(--z-red)'; }
function ffBand(v) { return v >= 75 ? 'Strong' : v >= 50 ? 'Caution' : 'Weak'; }
function ffBandCls(v) { return v >= 75 ? 'band-strong' : v >= 50 ? 'band-caution' : 'band-weak'; }
function priColor(p) { return p === 'high' ? 'var(--z-red-tx)' : p === 'medium' ? 'var(--z-amber-tx)' : 'var(--z-text-3)'; }
function adotC(d) { return { teal:'var(--z-teal)', amber:'var(--z-amber)', accent:'var(--z-accent)', red:'var(--z-red)' }[d] || 'var(--z-text-3)'; }
function actTypeLbl(t) { return { signal_extraction:'Signal extracted', opp_suggested:'Opp. suggested', ff_change:'FF change', draft_generated:'Draft generated', auto_sent:'Auto-sent', micro_agreement:'Micro-agreement', pre_qualification:'Pre-qualification' }[t] || t; }
function confPips(n, total, lvl) {
  var h = '<div class="z-cf">';
  for (var i = 0; i < total; i++) {
    var on = i < n;
    var cls = on ? (n === 3 ? 'hi' : n === 2 ? 'md' : 'lo') : '';
    h += '<div class="z-cf-p ' + cls + '"></div>';
  }
  return h + '</div>';
}

function ztoast(type, title, body) {
  var c = { success:'var(--z-teal)', warning:'var(--z-amber)', danger:'var(--z-red)', info:'var(--z-accent)' }[type] || 'var(--z-accent)';
  var $t = $('<div class="z-toast">');
  $t.html('<div class="z-toast-dot" style="background:' + c + ';"></div>' +
    '<div style="flex:1;"><div style="font-size:11px;font-weight:500;color:var(--z-text);">' + title + '</div>' +
    (body ? '<div style="font-size:10px;color:var(--z-text-2);margin-top:1px;line-height:1.4;">' + body + '</div>' : '') +
    '</div><button style="background:none;border:none;cursor:pointer;color:var(--z-text-3);font-size:12px;padding:0;flex-shrink:0;" onclick="$(this).closest(\'.z-toast\').remove()">✕</button>');
  $('#z-toasts').append($t);
  setTimeout(function () { $t.fadeOut(300, function () { $t.remove(); }); }, 3800);
}

/* ─────────────────────────────────────────────────
   ACTIVATE THREAD (main entry point)
───────────────────────────────────────────────── */
function activateThread(id) {
  S.threadId = id;
  S.zone = 'signal';
  var t = currentThread();
  t.unread = false;
  /* update gmail chrome */
  renderGmailList();
  renderGmailView(t);
  /* update sidebar */
  setTab('signal');
  renderActionStrip(t);
  /* update signal badge */
  var sigCount = t.hardFacts.length;
  if (sigCount > 0) {
    $('#badge-signal').text(sigCount).show();
  } else {
    $('#badge-signal').hide();
  }
  /* update Open in Zotra link */
  var dest = t.linked ? 'Workspace: ' + (t.workspaceName || t.company) : 'Opportunity: ' + t.company;
  $('#z-open-btn').attr('title', 'Open ' + dest + ' in Zotra');
}

/* ─────────────────────────────────────────────────

───────────────────────────────────────────────── */
$('#z-tabs').on('click', '.z-tab', function () {
  var zone = $(this).data('zone');
  setTab(zone);
});

function setTab(zone) {
  S.zone = zone;
  $('.z-tab').removeClass('on');
  $('.z-tab[data-zone="' + zone + '"]').addClass('on');
  renderZone(zone);
}

function renderZone(zone) {
  var t = currentThread();
  if (!t) {
    $('#z-content').html('<div style="padding:24px;text-align:center;color:var(--z-text-3);font-size:11px;line-height:1.6;">Open an email thread to see extracted signals and intelligence.</div>');
    return;
  }
  var $c = $('#z-content').empty();
  if (zone === 'signal')   renderSignalZone(t, $c);
  if (zone === 'brief')    renderBriefZone(t, $c);
  if (zone === 'draft')    renderDraftZone(t, $c);
  if (zone === 'activity') renderActivityZone(t, $c);
}

  /* draft text */
  var $dSec = secEl('Zotra draft reply');
  $dSec.find('.z-sec-lbl').append('<span>always sends from your own address</span>');
  $dSec.find('div:last').html(
    '<div class="z-draft-txt" id="z-draft-txt">' + d.text.replace(/\n/g, '<br>') + '</div>' +
    '<div style="margin-top:7px;display:flex;flex-direction:column;gap:6px;">' +
      '<button class="z-draft-copy-btn" onclick="zotra.copyDraft()">' +
        '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
        'Copy draft to clipboard' +
      '</button>' +
      '<div class="z-send-note">Zotra never sends from your address directly. Copy, paste into Gmail compose, and edit before sending.</div>' +
    '</div>'
  );
  $c.append($dSec);

  /* auto-send section */
  var $as = secEl('Auto-send rules');
  $as.find('div:last').html(
    '<div class="z-as-sec">' +
      '<div class="z-as-title">Eligible for auto-send (where Admin has enabled)</div>' +
      '<div class="z-as-row"><span>Portal reminders</span><div class="z-tog on" onclick="$(this).toggleClass(\'on\')"></div></div>' +
      '<div class="z-as-row"><span>Payment resends</span><div class="z-tog on" onclick="$(this).toggleClass(\'on\')"></div></div>' +
      '<div class="z-as-row"><span>Appointment confirmations</span><div class="z-tog on" onclick="$(this).toggleClass(\'on\')"></div></div>' +
      '<div class="z-as-row"><span>Receipt acknowledgements</span><div class="z-tog on" onclick="$(this).toggleClass(\'on\')"></div></div>' +
      '<div class="z-never"><strong>Never auto-send (platform enforced):</strong> pricing proposals · renewal openings · churn outreach · new contacts · Rasa below threshold</div>' +
    '</div>'
  );
  $c.append($as);
}

/* ─────────────────────────────────────────────────
   ACTIVITY ZONE
───────────────────────────────────────────────── */
function renderActivityZone(t, $c) {
  /* disable toggle */
  var $tog = $('<div class="z-sec"><div>');
  $tog.find('div').html(
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">' +
      '<div class="z-tog on" id="z-autosend-tog" onclick="$(this).toggleClass(\'on\');zotra.toggleAutoSend()"></div>' +
      '<span style="font-size:11px;color:var(--z-text-2);">Auto-send enabled for this thread</span>' +
    '</div>' +
    '<div style="font-size:10px;color:var(--z-text-3);">Overrides org-level setting for this thread only. ' +
      '<span style="color:var(--z-accent-tx);cursor:pointer;" onclick="zotra.openWS()">View workspace log ›</span>' +
    '</div>'
  );
  $c.append($tog);

  /* activity log */
  var $actSec = secEl('Thread activity');
  var $rows = $('<div>');
  t.activity.forEach(function (a) {
    $rows.append(
      '<div class="z-act-row">' +
        '<div class="z-act-dot" style="background:' + adotC(a.dot) + ';"></div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="z-act-type">' + actTypeLbl(a.type) + '</div>' +
          '<div class="z-act-desc">' + a.desc + '</div>' +
          '<div class="z-act-meta">' + a.meta + '</div>' +
        '</div>' +
        '<div class="z-act-time">' + a.time + '</div>' +
      '</div>'
    );
  });
  $actSec.find('div:last').append($rows);
  $c.append($actSec);
}

/* ─────────────────────────────────────────────────
   ACTION STRIP
───────────────────────────────────────────────── */
function renderActionStrip(t) {
  var $strip = $('#z-actions').empty();
  if (!t.linked) {
    $strip.append(
      '<button class="z-act-btn create" onclick="zotra.createOpp()">' +
        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' +
        'Create opportunity' +
      '</button>'
    );
  }
  $strip.append(
    '<button class="z-act-btn link" onclick="zotra.linkWS()">' +
      '<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>' +
      (t.linked ? 'Workspace' : 'Link') +
    '</button>'
  );
  $strip.append(
    '<button class="z-act-btn open" onclick="zotra.openWS()">' +
      '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
      'Open in Zotra' +
    '</button>'
  );
  $strip.append(
    '<button class="z-act-btn upload" onclick="zotra.openTranscript()">' +
      '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
      'Transcript' +
    '</button>'
  );
}

/* ─────────────────────────────────────────────────
   SECTION HELPER
───────────────────────────────────────────────── */
function secEl(label) {
  var $s = $('<div class="z-sec">');
  $s.html('<div class="z-sec-lbl">' + label + '</div><div></div>');
  return $s;
}

/* ─────────────────────────────────────────────────
   TRANSCRIPT OVERLAY
───────────────────────────────────────────────── */
var ZOTRA_OV = {
  open: function () {
    itemStates = {};
    $('#z-extract-items').hide().empty();
    $('#z-ov-followup,#z-ov-save').hide();
    $('#z-ov-sub').text('Upload a transcript to extract and review confirmable facts');
    updateOvCount();
    $('#z-overlay').addClass('open');
  },
  close: function () {
    $('#z-overlay').removeClass('open');
    itemStates = {};
  }
};

$('#z-ov-close').on('click', function () { ZOTRA_OV.close(); });

function updateOvCount() {
  var n = Object.keys(itemStates).filter(function (k) { return itemStates[k] === 'confirmed'; }).length;
  $('#z-ov-note').text(n + ' item' + (n !== 1 ? 's' : '') + ' confirmed — writes with internally_confirmed attribution on save');
}

function renderExtractItems() {
  var $body = $('#z-extract-items').show().empty();
  EXTRACT_ITEMS.forEach(function (item) {
    var state = itemStates[item.id] || '';
    var confirmed = state === 'confirmed', discarded = state === 'discarded';
    var catLabel = { confirmable:'✓ Confirmable fact', provisional:'◌ Provisional signal', parking:'Parking lot →', noise:'Noise' }[item.cat];
    var $card = $('<div class="z-ex ' + item.cat.slice(0, 3) + '">');
    $card.html(
      '<div class="z-ex-hd">' +
        '<span class="z-ex-cat">' + catLabel + '</span>' +
        (confirmed ? '<span class="xb xb-conf" style="font-size:8px;">✓ Confirmed</span>' : '') +
        (discarded ? '<span class="xb xb-red" style="font-size:8px;">✕ Discarded</span>' : '') +
      '</div>' +
      '<div class="z-ex-body">' +
        '<div class="z-ex-key">' + item.key + '</div>' +
        '<div>' + item.val + '</div>' +
        '<div class="z-ex-orig">"' + item.orig + '"</div>' +
      '</div>' +
      '<div class="z-ex-acts">' +
        (item.cat !== 'noise' && !confirmed
          ? '<button class="z-btn teal" style="font-size:9px;padding:2px 7px;" data-confirm="' + item.id + '">✓ Confirm</button>' : '') +
        (confirmed
          ? '<button class="z-btn" style="font-size:9px;padding:2px 7px;" data-undo="' + item.id + '">Undo</button>' : '') +
        (!confirmed
          ? '<button class="z-btn" style="font-size:9px;padding:2px 7px;" data-edit="' + item.id + '">Edit</button>' : '') +
        (!discarded
          ? '<button class="z-btn" style="font-size:9px;padding:2px 7px;color:var(--z-red-tx);" data-discard="' + item.id + '">✕</button>'
          : '<button class="z-btn" style="font-size:9px;padding:2px 7px;" data-restore="' + item.id + '">Restore</button>') +
      '</div>'
    );
    $body.append($card);
  });
}

$('#z-ov-body').on('click', '[data-confirm]', function () {
  itemStates[$(this).data('confirm')] = 'confirmed';
  renderExtractItems(); updateOvCount();
  ztoast('success', 'Confirmed', 'Will write to baseline with internally_confirmed attribution.');
}).on('click', '[data-undo]', function () {
  delete itemStates[$(this).data('undo')];
  renderExtractItems(); updateOvCount();
}).on('click', '[data-discard]', function () {
  itemStates[$(this).data('discard')] = 'discarded';
  renderExtractItems(); updateOvCount();
  ztoast('info', 'Discarded', 'Item removed.');
}).on('click', '[data-restore]', function () {
  delete itemStates[$(this).data('restore')];
  renderExtractItems(); updateOvCount();
}).on('click', '[data-edit]', function () {
  ztoast('info', 'Edit', 'Inline signal editor opens here.');
});

$('#z-ov-followup').on('click', function () {
  ztoast('success', 'Follow-up email generated', 'Agent-drafted follow-up ready. Copy to Gmail compose — client acknowledgement closes the bilateral loop.');
});
$('#z-ov-save').on('click', function () {
  var n = Object.keys(itemStates).filter(function (k) { return itemStates[k] === 'confirmed'; }).length;
  if (!n) { ztoast('warning', 'Nothing to save', 'Confirm at least one item first.'); return; }
  ZOTRA_OV.close();
  ztoast('success', 'Baselines updated', n + ' field' + (n !== 1 ? 's' : '') + ' written with internally_confirmed attribution. Send the follow-up email to close the bilateral loop.');
});

/* ─────────────────────────────────────────────────
   PUBLIC API (called from inline handlers)
───────────────────────────────────────────────── */
window.zotra = {
  createOpp: function () {
    var t = currentThread();
    if (!t) return;
    if (t.preQual) {
      ztoast('warning', 'Pre-qualification active', 'Resolve minimum info before creating opportunity: ' + (t.preQualMissing[0] || ''));
      return;
    }
    t.linked = true;
    t.workspaceName = t.company;
    renderActionStrip(t);
    setTab('brief');
    ztoast('success', 'Opportunity created', t.company + ' — Opportunity Brief pre-seeded from email signals.');
  },
  linkWS: function () {
    var t = currentThread(); if (!t) return;
    ztoast('info', 'Link to workspace', 'Workspace selector coming soon. For now, opportunity will be created.');
  },
  openWS: function () {
    var t = currentThread(); if (!t) return;
    var dest = t.linked ? ('Workspace: ' + (t.workspaceName || t.company)) : ('Opportunity for ' + t.company);
    ztoast('info', 'Open in Zotra', 'Deep-linking to ' + dest + '…');
  },
  copyDraft: function () {
    var txt = $('#z-draft-txt').text();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(function () {
        ztoast('success', 'Copied', 'Paste into Gmail compose and edit before sending from your address.');
      }).catch(function () {
        ztoast('info', 'Draft ready', 'Select the text above and copy manually, then paste into Gmail compose.');
      });
    } else {
      ztoast('info', 'Draft ready', 'Select the text and copy manually, then paste into Gmail compose.');
    }
  },
  toggleAutoSend: function () {
    var on = $('#z-autosend-tog').hasClass('on');
    ztoast('info', 'Auto-send ' + (on ? 'enabled' : 'disabled'), 'Changed for this thread only.');
  },
  addSignal: function () {
    ztoast('info', 'Add signal', 'Inline provisional signal editor opens here. Never writes to confirmed baselines.');
  },
  openTranscript: function () {
    ZOTRA_OV.open();
  },
  simulateUpload: function () {
    $('#z-ov-sub').text('TechNova renewal call — April 14, 2026');
    $('#z-ov-followup,#z-ov-save').show();
    renderExtractItems();
    updateOvCount();
  }
};
